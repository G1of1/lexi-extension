<!-- PolicyPal AI - SVG icon (1024x1024 viewBox)
     Palette:
       Blue:   #1E88E5
       Deep:   #0D47A1
       Black:  #000000
       White:  #FFFFFF
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">PolicyPal AI icon — shield with document and lens</title>
  <defs>
    <linearGradient id="gBlue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1E88E5"/>
      <stop offset="1" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- subtle backdrop circle for chrome-extension-friendly look -->
  <circle cx="512" cy="512" r="512" fill="url(#gBlue)"/>

  <!-- main shield -->
  <g transform="translate(160,140)">
    <path d="M192 0 L576 0 L704 160 L576 576 L384 704 L192 576 L64 160 Z"
          transform="translate(0,32) scale(0.9)"
          fill="#fff" opacity="0.06"/>
    <path d="M320 16 C320 16 512 48 640 176 C640 176 672 352 512 480 C352 352 320 176 320 16 Z"
          fill="url(#gBlue)" filter="url(#softShadow)"/>
    <!-- shield border for crispness -->
    <path d="M320 16 C320 16 512 48 640 176 C640 176 672 352 512 480 C352 352 320 176 320 16 Z"
          fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="14" />
  </g>

  <!-- document inside the shield -->
  <g transform="translate(320,240) scale(0.9)">
    <!-- white paper -->
    <path d="M128 32 H416 L480 96 V448 C480 496 448 528 400 528 H144 C96 528 64 496 64 448 V80 C64 48 88 32 128 32 Z"
          fill="#FFFFFF"/>
    <!-- folded corner -->
    <path d="M416 96 L368 96 L416 144 Z" fill="#EAF4FF" />
    <!-- text lines -->
    <g fill="#000000" opacity="0.85" transform="translate(104,160)">
      <rect x="0" y="0" width="288" height="18" rx="9"/>
      <rect x="0" y="40" width="240" height="14" rx="7"/>
      <rect x="0" y="68" width="176" height="14" rx="7"/>
    </g>
  </g>

  <!-- magnifying glass (lens) overlapping edge of document to show 'analysis' -->
  <g transform="translate(640,560) rotate(-12) scale(0.9)">
    <circle cx="0" cy="0" r="72" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="64" fill="none" stroke="#0D47A1" stroke-width="14" />
    <!-- inner sparkle / AI hint (tiny nodes) -->
    <g transform="translate(-12,-8)">
      <circle cx="10" cy="-6" r="6" fill="#1E88E5"/>
      <circle cx="24" cy="4" r="5" fill="#0D47A1"/>
      <circle cx="-6" cy="10" r="4" fill="#1E88E5"/>
    </g>
    <!-- handle -->
    <rect x="50" y="62" width="16" height="88" rx="8" fill="#0D47A1" transform="rotate(40 58 100)" />
  </g>

  <!-- small black accent / name hint (optional subtle) -->
  <rect x="324" y="844" width="376" height="32" rx="16" fill="#000000" opacity="0.06"/>

</svg>
